name: Weekly SEO

# Runs the mechanical SEO maintenance loop unattended in the cloud — no laptop
# needed. The creative part (writing new city/keyword pages) stays a human/AI
# task; this job keeps the site healthy and the sitemap honest, and fails
# loudly (emails repo admins) if any SEO regression is detected.

on:
  schedule:
    - cron: "0 7 * * 1"      # Every Monday 07:00 UTC
  workflow_dispatch: {}        # ...and a manual "Run workflow" button

permissions:
  contents: write              # allow committing the refreshed sitemap

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so lastmod dates are accurate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regression check (fails the run if SEO breaks)
        run: python3 seo-tools/check_seo.py

      - name: Refresh sitemap
        run: python3 seo-tools/generate_sitemap.py

      - name: Commit sitemap if it changed
        run: |
          git config user.name  "seo-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- sitemap.xml; then
            echo "Sitemap unchanged — nothing to commit."
          else
            git add sitemap.xml
            git commit -m "chore(seo): weekly sitemap refresh"
            git push
            echo "Sitemap updated and pushed."
          fi
